<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-dark text-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <h3 class="mb-3">Contact Form</h3>
            <form method="post" novalidate>
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" value="{{ name|e }}">
              </div>

              <div class="mb-3">
                <label class="form-label">Email ID <span class="text-danger">*</span></label>
                <input class="form-control" name="email" value="{{ email|e }}" required>
                {% if errors.email %}
                <div class="text-danger small mt-1">{{ errors.email }}</div>
                {% endif %}
              </div>

              <div class="mb-3">
                <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                <input class="form-control" name="phone" value="{{ phone|e }}" required>
                {% if errors.phone %}
                <div class="text-danger small mt-1">{{ errors.phone }}</div>
                {% endif %}
              </div>

              <button class="btn btn-primary" type="submit">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
